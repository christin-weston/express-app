services:
  express-app:
    image: christinweston/express-app
    ports:
      - 3002:8080
    restart: unless-stopped

  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_POLL_INTERVAL=60
      - DOCKER_API_VERSION=1.40
    restart: unless-stopped
